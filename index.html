
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>agugulu_art | Petrovic Denis</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:white;
color:#222;
}

/* HEADER */

header{
text-align:center;
padding:25px;
font-size:26px;
font-weight:bold;
}

/* HERO */

.hero{
height:60vh;
display:flex;
align-items:center;
justify-content:center;
background:#f2f2f2;
font-size:40px;
}

/* SECTION */

section{
padding:60px 10%;
text-align:center;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:40px;
}

.art{
background:#fafafa;
padding:20px;
border-radius:10px;
}

.art img{
width:100%;
border-radius:10px;
cursor:pointer;
}

.price{
font-weight:bold;
margin-top:10px;
font-size:20px;
}

button{
margin-top:10px;
padding:10px 20px;
background:black;
color:white;
border:none;
cursor:pointer;
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

/* SCROLL STORY */

.scroll img{
width:80%;
max-width:800px;
margin:60px auto;
display:block;
opacity:0;
transform:translateY(80px);
transition:1s;
}

.scroll img.visible{
opacity:1;
transform:translateY(0);
}

/* CONTACT */

.contact a{
display:block;
margin:10px;
font-size:18px;
color:black;
text-decoration:none;
}

/* FOOTER */

footer{
margin-top:60px;
padding:30px;
background:#f5f5f5;
text-align:center;
}

</style>

</head>

<body>

<header>

Art Gallery

<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<script>

/* LIGHTBOX */

let imgs=document.querySelectorAll(".art img")
let lightbox=document.getElementById("lightbox")
let lightboxImg=document.getElementById("lightbox-img")

imgs.forEach(img=>{
img.addEventListener("click",()=>{
lightbox.style.display="flex"
lightboxImg.src=img.src
})
})

lightbox.addEventListener("click",()=>{
lightbox.style.display="none"
})

/* SCROLL EFFECT */

const scrollImgs=document.querySelectorAll(".scroll-img")

function reveal(){

scrollImgs.forEach(img=>{

const top=img.getBoundingClientRect().top
const windowHeight=window.innerHeight

if(top < windowHeight - 100){
img.classList.add("visible")
}

})

}

window.addEventListener("scroll",reveal)

</script>

</body>

<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agugulu_art | Petrovic Denis</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        color: rgb(21, 20, 20);

        background-image: url("bilder/background.jp");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
      }

      header {
        text-align: center;
        padding: 30px;
        font-size: 28px;
        font-weight: bold;
      }

      .hero {
        height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        color: rgb(17, 16, 16);

        background-image: url("bilder/background.jpg");
        background-size: cover;
        background-position: center;
      }

      /* GALLERY */

      section {
        padding: 60px 10%;
        text-align: center;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 40px;
      }

      .art {
        background: #fafafa;
        padding: 20px;
        border-radius: 10px;
      }

      .art img {
        width: 100%;
        border-radius: 10px;
      }

      .price {
        font-weight: bold;
        margin-top: 10px;
        font-size: 22px;
      }

      button {
        margin-top: 15px;
        padding: 12px 25px;
        background: black;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
      }

      /* SCROLL STORY */

      .scroll-section img {
        width: 80%;
        max-width: 900px;
        margin: 80px auto;
        display: block;
        opacity: 0;
        transform: translateY(80px);
        transition: 1s;
      }

      .scroll-section img.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* CONTACT */

      .contact a {
        display: block;
        margin: 10px;
        font-size: 18px;
        text-decoration: none;
        color: black;
      }

      footer {
        margin-top: 60px;
        padding: 30px;
        background: #f5f5f5;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <header>agugulu_art | Petrovic Denis</header>

    <div class="hero">Original Art Gallery</div>

    <section>
      <h2>Original Artworks</h2>

      <div class="gallery">
        <div class="art">
          <img src="bilder/art1.jpg" />

          <h3>Golden Abstract Face</h3>

          <p class="price">7430 €</p>

          <button>Kaufen mit Karte</button>
        </div>

        <div class="art">
          <img src="bilder/art2.jpg" />

          <h3>Cosmic Blue Face</h3>

          <p class="price">1600 €</p>

          <button>Kaufen mit Karte</button>
        </div>
      </div>
    </section>

    <section class="scroll-section">
      <h2>Cosmic Blue Face – Details</h2>

      <img src="bilder/art2.jpg" class="scroll-img" />

      <img src="bilder/detail1.jpg" class="scroll-img" />

      <img src="bilder/detail2.jpg" class="scroll-img" />
    </section>

    <section>
      <h2>Kontakt</h2>

      <div class="contact">
        <p>Email: denispetro@hotmail.com</p>

        <a href="https://www.instagram.com/agugulu_art/" target="_blank">
          Instagram: @agugulu_art
        </a>
      </div>
    </section>

    <footer>© 2026 agugulu_art | Petrovic Denis</footer>

    <script>
      /* SCROLL EFFECT */

      const images = document.querySelectorAll(".scroll-img");

      function revealImages() {
        images.forEach((img) => {
          const top = img.getBoundingClientRect().top;
          const windowHeight = window.innerHeight;

          if (top < windowHeight - 100) {
            img.classList.add("visible");
          }
        });
      }

      window.addEventListener("scroll", revealImages);
    </script>
  </body>
</html>
